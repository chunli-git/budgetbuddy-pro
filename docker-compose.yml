services:
  db:
    image: postgres:17-alpine
    container_name: budgetbuddy_postgres
    restart: always
    environment:
      POSTGRES_USER: budgetbuddy_user
      POSTGRES_PASSWORD: budgetbuddy_password
      POSTGRES_DB: budgetbuddy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: